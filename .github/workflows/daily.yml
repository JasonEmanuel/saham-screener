name: Daily IDX Screening

on:
  schedule:
    - cron: "15 10 * * 1-5"   # 17:15 WIB, hari kerja (cron pakai UTC)
  workflow_dispatch:           # tombol run manual untuk testing

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Update daftar emiten
        run: python pipeline/update_tickers.py || echo "screener gagal, pakai tickers.txt lama"

      - name: Fetch dataset
        run: |
          mkdir -p data
          python pipeline/fetch_idx.py --output data/dataset.json --delay 0.6 --tickers-file pipeline/tickers.txt

      - name: Analisa berita
        run: python pipeline/news.py || echo "analisa berita gagal, lanjut tanpa berita"

      - name: Scoring & ranking
        run: python pipeline/scoring.py

      - name: Evaluasi sinyal
        run: python pipeline/evaluate.py || echo "evaluasi gagal, lanjut"

      - name: Commit hasil
        run: |
          git config user.name "idx-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data pipeline/tickers.txt
          git commit -m "data: screening $(date -u +%F)" || echo "no changes"
          git push
