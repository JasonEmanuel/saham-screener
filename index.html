<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IDX Screener Harian</title>
<style>
  :root{
    --bg:#EEF1F5; --panel:#FFFFFF; --ink:#16243D; --muted:#5B6B84;
    --line:#D8DEE7; --up:#0E9F6E; --down:#D64545; --warn:#B7791F;
    --chip:#F1F4F8; --accent:#1D4ED8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    padding:20px 16px 60px}
  .wrap{max-width:1100px;margin:0 auto}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-variant-numeric:tabular-nums}

  header h1{font-size:clamp(22px,4vw,32px);letter-spacing:-.02em}
  header .sub{color:var(--muted);margin-top:4px;font-size:13px}
  .board{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 6px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 16px;min-width:120px}
  .tile b{display:block;font-size:22px}
  .tile span{font-size:12px;color:var(--muted)}
  .disclaimer{font-size:12px;color:var(--muted);border-left:3px solid var(--warn);
    padding:6px 10px;margin:14px 0;background:var(--panel);border-radius:0 8px 8px 0}

  nav{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0 14px}
  nav button{border:1px solid var(--line);background:var(--panel);color:var(--ink);
    padding:8px 14px;border-radius:999px;cursor:pointer;font-size:14px}
  nav button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  nav button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .toolbar{display:flex;gap:10px;align-items:center;margin:0 0 12px;flex-wrap:wrap}
  select,input[type=search],input[type=text]{padding:8px 12px;border:1px solid var(--line);
    border-radius:8px;background:var(--panel);font-size:14px;color:var(--ink)}
  input[type=search]{min-width:220px}

  .tablewrap{overflow-x:auto;background:var(--panel);border:1px solid var(--line);
    border-radius:12px}
  table{border-collapse:collapse;width:100%;min-width:940px;font-size:13.5px}
  th,td{padding:9px 12px;text-align:right;white-space:nowrap}
  th{position:sticky;top:0;background:var(--panel);color:var(--muted);
    font-weight:600;font-size:12px;border-bottom:1px solid var(--line);text-align:right}
  th:nth-child(-n+4),td:nth-child(-n+4){text-align:left}
  tbody tr{border-bottom:1px solid var(--line);cursor:pointer}
  tbody tr:hover{background:var(--chip)}
  tbody tr:last-child{border-bottom:0}
  .pos{color:var(--up)} .neg{color:var(--down)}
  .scorecell{display:flex;align-items:center;gap:8px;justify-content:flex-end}
  .bar{width:64px;height:5px;border-radius:3px;background:var(--chip);overflow:hidden}
  .bar i{display:block;height:100%;background:var(--up)}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;
    font-weight:600}
  .b-buy{background:#E3F5EC;color:var(--up)}
  .b-watch{background:#FBF3E0;color:var(--warn)}
  .b-avoid{background:#FBE7E7;color:var(--down)}
  .b-neutral{background:var(--chip);color:var(--muted)}
  .empty{padding:30px;text-align:center;color:var(--muted)}
  .evalhead{padding:16px 16px 4px}
  .evalhead .board{margin:0 0 8px}
  .evalnote{font-size:12px;color:var(--muted);padding:0 16px 12px}

  dialog{border:0;border-radius:14px;max-width:560px;width:92vw;padding:0;
    box-shadow:0 20px 60px rgba(22,36,61,.25)}
  dialog::backdrop{background:rgba(22,36,61,.45)}
  .d-head{padding:18px 22px 12px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:start;gap:10px}
  .d-head h2{font-size:20px}
  .d-head .sec{color:var(--muted);font-size:12.5px}
  .d-close{border:0;background:var(--chip);border-radius:8px;padding:6px 11px;
    cursor:pointer;font-size:14px}
  .d-body{padding:16px 22px 22px;max-height:70vh;overflow-y:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px 16px;margin-bottom:14px}
  .kv span{display:block;font-size:11.5px;color:var(--muted)}
  .kv b{font-size:15px;font-weight:600}
  .scores{margin:6px 0 14px}
  .srow{display:grid;grid-template-columns:110px 1fr 44px;gap:10px;
    align-items:center;font-size:12.5px;margin:5px 0}
  .srow .bar{width:100%}
  h3.sect{font-size:12px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.06em;margin:16px 0 8px;border-top:1px solid var(--line);
    padding-top:12px;display:flex;align-items:center;gap:8px}
  .irow{display:grid;grid-template-columns:130px 1fr auto;gap:10px;
    align-items:center;font-size:13px;padding:4px 0}
  .irow .lab{color:var(--muted);font-size:12.5px}
  .pats{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .hl{font-size:13px;padding:5px 0;display:flex;gap:8px;align-items:baseline}
  .hl .dt{color:var(--muted);font-size:11.5px;white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;position:relative;top:1px}
  .reasons{font-size:13px;color:var(--muted);margin-top:12px}
  .reasons li{margin-left:18px}

  /* rencana trading */
  .track{position:relative;height:16px;border-radius:8px;background:var(--chip);
    margin:14px 2px 10px}
  .zone{position:absolute;top:0;height:100%;background:rgba(29,78,216,.18);
    border-radius:8px}
  .mk{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;
    transform:translate(-50%,-50%);border:2px solid var(--panel);
    box-shadow:0 0 0 1px rgba(22,36,61,.15)}
  .lvl{display:grid;grid-template-columns:14px 1fr auto auto;gap:10px;
    align-items:center;font-size:13px;padding:4px 0}
  .lvl .nm{color:var(--muted)}
  .lvl .pc{font-size:12px;min-width:58px;text-align:right}
  .calc{background:var(--chip);border-radius:10px;padding:12px 14px;margin-top:14px}
  .calc label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
  .calc input{width:100%;max-width:240px}
  .calc table{min-width:0;width:100%;font-size:13px;margin-top:10px}
  .calc td{padding:4px 6px}
  .calc td:first-child{text-align:left;color:var(--muted)}
  .cnote{font-size:11.5px;color:var(--muted);margin-top:8px}
  .copybtn{margin-top:12px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
  @media (max-width:560px){ .tile{min-width:calc(50% - 10px)} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>IDX Screener Harian</h1>
    <div class="sub" id="meta">Memuat data…</div>
    <div class="board" id="board" hidden>
      <div class="tile"><b id="c-scored">–</b><span>Emiten dinilai</span></div>
      <div class="tile"><b id="c-buy">–</b><span>Kandidat BUY</span></div>
      <div class="tile"><b id="c-watch">–</b><span>Watchlist</span></div>
      <div class="tile"><b id="c-avoid">–</b><span>Avoid</span></div>
    </div>
    <p class="disclaimer">Hasil screening kuantitatif otomatis dari data publik
      (Yahoo Finance delayed + Google News). Bukan nasihat keuangan — lakukan
      riset mandiri sebelum berinvestasi.</p>
  </header>

  <nav id="tabs">
    <button data-tab="top20" class="active">TOP BUY</button>
    <button data-tab="watchlist">Watchlist</button>
    <button data-tab="avoid">Avoid</button>
    <button data-tab="categories">Kategori</button>
    <button data-tab="all">Semua</button>
    <button data-tab="eval">Evaluasi</button>
  </nav>

  <div class="toolbar" id="cat-toolbar" hidden>
    <select id="cat-select">
      <option value="top_growth">Top Growth</option>
      <option value="top_value">Top Value</option>
      <option value="top_dividend">Top Dividend</option>
      <option value="top_momentum">Top Momentum</option>
      <option value="top_foreign_buy">Top Foreign Buy</option>
    </select>
  </div>
  <div class="toolbar" id="search-toolbar" hidden>
    <input type="search" id="q" placeholder="Cari kode atau nama emiten…">
    <span id="q-count" style="font-size:12.5px;color:var(--muted)"></span>
  </div>

  <div class="tablewrap"><div id="content" class="empty">Memuat…</div></div>
</div>

<dialog id="detail">
  <div class="d-head">
    <div><h2 id="d-title">–</h2><div class="sec" id="d-sub">–</div></div>
    <button class="d-close" id="d-close">Tutup</button>
  </div>
  <div class="d-body" id="d-body"></div>
</dialog>

<script>
const S = { data:{}, tab:"top20", cat:"top_growth", q:"", prev:undefined };
const $ = id => document.getElementById(id);
const bust = "?t=" + Date.now();
const LOT = 100;

const fmtN = new Intl.NumberFormat("id-ID");
const num  = (v,d=1) => v==null ? "—" : Number(v).toLocaleString("id-ID",
              {maximumFractionDigits:d});
const rp   = v => v==null ? "—" : fmtN.format(Math.round(v));
const pct  = v => v==null ? "—" : (v>0?"+":"") + Number(v).toFixed(1) + "%";
const pct2 = v => v==null ? "—" : (v>0?"+":"") + (v*100).toFixed(1) + "%";
const cap  = v => v==null ? "—" :
  v>=1e12 ? (v/1e12).toFixed(2)+" T" :
  v>=1e9  ? (v/1e9).toFixed(1)+" M"  : fmtN.format(v);
const cls  = v => v==null ? "" : v>0 ? "pos" : v<0 ? "neg" : "";
const badge = r => ({BUY:"b-buy",WATCHLIST:"b-watch",AVOID:"b-avoid"}[r]||"b-neutral");
const esc = s => String(s??"").replace(/[&<>"]/g,
  c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const BULL_PATS = new Set(["Golden Cross","Breakout","Double Bottom","Bull Flag"]);

async function load(name){
  if(S.data[name]!==undefined) return S.data[name];
  try{
    const r = await fetch("data/"+name+".json"+bust);
    S.data[name] = r.ok ? await r.json() : null;
  }catch(e){ S.data[name] = null; }
  return S.data[name];
}

async function loadPrevRanks(){
  if(S.prev!==undefined) return S.prev;
  S.prev = null;
  const idx = await load("history/index");
  if(Array.isArray(idx) && idx.length>=2){
    const arr = await load("history/"+idx[idx.length-2]);
    if(Array.isArray(arr)){
      S.prev = {};
      arr.forEach(x=>{ if(x.kode!=null) S.prev[x.kode]=x.rank; });
    }
  }
  return S.prev;
}

function deltaCell(r, prev){
  if(!prev) return '<td class="mono" style="color:var(--muted)">—</td>';
  const p = prev[r.kode];
  if(p==null) return '<td class="mono" style="color:var(--accent)">baru</td>';
  const d = p - r.rank;
  if(!d) return '<td class="mono" style="color:var(--muted)">•</td>';
  return `<td class="mono ${d>0?"pos":"neg"}">${d>0?"▲":"▼"}${Math.abs(d)}</td>`;
}

function rowsTable(rows, prev){
  if(!rows || !rows.length)
    return '<div class="empty">Tidak ada emiten di daftar ini hari ini.</div>';
  const tr = rows.map((r,i)=>`
    <tr data-k="${esc(r.kode)}">
      <td class="mono">${r.rank??i+1}</td>
      ${deltaCell(r, prev)}
      <td class="mono"><b>${esc(r.kode)}</b></td>
      <td>${esc(r.nama??"—")}</td>
      <td class="mono">${rp(r.harga)}</td>
      <td class="mono">${rp(r.fair_value)}</td>
      <td class="mono ${cls(r.upside_pct)}">${pct(r.upside_pct)}</td>
      <td class="mono">${num(r.score_fundamental,0)}</td>
      <td class="mono">${num(r.score_technical,0)}</td>
      <td class="mono">${num(r.score_news,0)}</td>
      <td><div class="scorecell"><div class="bar"><i style="width:${(r.total_score??0)}%"></i></div>
          <span class="mono"><b>${num(r.total_score)}</b></span></div></td>
      <td><span class="badge ${badge(r.rating)}">${esc(r.rating)}</span></td>
    </tr>`).join("");
  return `<table>
    <thead><tr><th>#</th><th>Δ</th><th>Kode</th><th>Nama</th><th>Harga</th>
    <th>Fair Value</th><th>Upside</th><th>Fund</th><th>Tek</th><th>News</th>
    <th>Total</th><th>Rating</th></tr></thead>
    <tbody>${tr}</tbody></table>`;
}

function maRow(label, harga, ma){
  if(ma==null) return `<div class="irow"><span class="lab">${label}</span>
    <b class="mono">—</b><span class="badge b-neutral">Data Tidak Cukup</span></div>`;
  const above = harga!=null && harga>ma;
  return `<div class="irow"><span class="lab">${label}</span>
    <b class="mono">${rp(ma)}</b>
    <span class="badge ${above?"b-buy":"b-avoid"}">${above?"Harga di atas":"Harga di bawah"}</span></div>`;
}

function techSection(r){
  const macd = r.macd_hist==null ? null : r.macd_hist>0;
  const k = r.stochrsi_k, d = r.stochrsi_d;
  let zone = "—", zcls = "b-neutral";
  if(k!=null){
    if(k<20){ zone="Oversold"; zcls="b-watch"; }
    else if(k>80){ zone="Overbought"; zcls="b-avoid"; }
    else { zone="Netral"; zcls="b-neutral"; }
  }
  const vr = r.volume_ratio;
  const pats = r.patterns||[];
  return `<h3 class="sect">Analisa Teknikal</h3>
    ${maRow("MA20", r.harga, r.sma20)}
    ${maRow("MA50", r.harga, r.sma50)}
    ${maRow("MA200", r.harga, r.sma200)}
    <div class="irow"><span class="lab">MACD histogram</span>
      <b class="mono">${num(r.macd_hist,2)}</b>
      <span class="badge ${macd==null?"b-neutral":macd?"b-buy":"b-avoid"}">
        ${macd==null?"—":macd?"Bullish":"Bearish"}</span></div>
    <div class="irow"><span class="lab">Stoch RSI %K / %D</span>
      <b class="mono">${num(k,0)} / ${num(d,0)}</b>
      <span class="badge ${zcls}">${zone}</span></div>
    <div class="irow"><span class="lab">Volume vs rata2 20h</span>
      <b class="mono">${vr==null?"—":num(vr,2)+"×"}</b>
      <span class="badge ${vr!=null&&vr>1.5?"b-buy":"b-neutral"}">
        ${vr==null?"—":vr>1.5?"Volume tinggi":"Normal"}</span></div>
    <div class="irow" style="align-items:start"><span class="lab">Chart pattern</span>
      <div class="pats" style="grid-column:2/4">
        ${pats.length ? pats.map(p=>`<span class="badge ${
            BULL_PATS.has(p)?"b-buy":"b-avoid"}">${esc(p)}</span>`).join("")
          : '<span class="badge b-neutral">Tidak ada pattern terdeteksi</span>'}
      </div></div>`;
}

function newsSection(r){
  const hs = r.headlines||[];
  const dot = s => s>0 ? "var(--up)" : s<0 ? "var(--down)" : "var(--muted)";
  return `<h3 class="sect">Berita 30 Hari
      ${r.news_count?` · ${r.news_count} artikel`:""}</h3>
    ${hs.length ? hs.map(h=>`
      <div class="hl"><span class="dot" style="background:${dot(h.s)}"></span>
        <span class="dt mono">${esc(h.d)}</span><span>${esc(h.t)}</span></div>`).join("")
      : '<div class="reasons">Tidak ada berita ter-index untuk emiten ini.</div>'}`;
}

/* ---------- Rencana Trading ---------- */
function planLevels(r){
  const bl = r.buy_area_low, bh = r.buy_area_high ?? r.harga;
  return {
    sl: r.stop_loss, bl, bh,
    avg: r.average_buy ?? r.harga,
    now: r.harga,
    tps: [["TP1", r.take_profit_1], ["TP2", r.take_profit_2], ["TP3", r.take_profit_3]]
      .filter(([,v]) => v!=null && r.harga!=null && v > r.harga * 0.995),
  };
}

function tradeSection(r){
  const P = planLevels(r);
  if(!P.now || (!P.sl && !P.tps.length)) return "";
  const vals = [P.sl, P.bl, P.now, ...P.tps.map(t=>t[1])].filter(v=>v!=null);
  const lo = Math.min(...vals)*0.985, hi = Math.max(...vals)*1.015;
  const pos = v => ((v-lo)/(hi-lo)*100).toFixed(1);
  const pcOf = v => v==null||!P.now ? "—" : pct((v-P.now)/P.now*100);

  const zone = P.bl!=null ?
    `<div class="zone" style="left:${pos(P.bl)}%;width:${(pos(P.bh)-pos(P.bl)).toFixed(1)}%"></div>` : "";
  const mks = [
    P.sl!=null ? `<div class="mk" style="left:${pos(P.sl)}%;background:var(--down)" title="Stop Loss"></div>` : "",
    `<div class="mk" style="left:${pos(P.now)}%;background:var(--ink)" title="Harga sekarang"></div>`,
    ...P.tps.map(([n,v])=>`<div class="mk" style="left:${pos(v)}%;background:var(--up)" title="${n}"></div>`),
  ].join("");

  const lvl = (color,nm,val,pc) => `<div class="lvl">
      <span class="dot" style="background:${color}"></span>
      <span class="nm">${nm}</span><b class="mono">${val}</b>
      <span class="pc mono ${pc.startsWith("+")?"pos":pc.startsWith("-")?"neg":""}">${pc}</span></div>`;

  const rows = [
    ...[...P.tps].reverse().map(([n,v])=>lvl("var(--up)", n, rp(v), pcOf(v))),
    lvl("var(--ink)", "Harga sekarang", rp(P.now), ""),
    P.bl!=null ? lvl("var(--accent)", "Buy area", `${rp(P.bl)} – ${rp(P.bh)}`,
      `avg ${rp(P.avg)}`) : "",
    P.sl!=null ? lvl("var(--down)", "Stop Loss (cut loss)", rp(P.sl), pcOf(P.sl)) : "",
  ].join("");

  return `<h3 class="sect">Rencana Trading
      ${r.rating==="BUY" ? '<span class="badge b-buy">Sinyal BUY</span>'
        : '<span class="badge b-neutral">Referensi (bukan sinyal BUY)</span>'}
      ${r.risk_reward!=null ? `<span class="badge b-neutral">R/R ${r.risk_reward}</span>` : ""}</h3>
    <div class="track">${zone}${mks}</div>
    <div>${rows}</div>
    <div class="calc">
      <label for="tp-modal">Simulasi modal (Rp) — hitung otomatis per lot</label>
      <input type="text" id="tp-modal" inputmode="numeric" placeholder="contoh: 10.000.000">
      <div id="tp-result"></div>
      <div class="cnote">1 lot = 100 lembar · asumsi beli di average buy · belum termasuk fee broker</div>
    </div>
    <button class="copybtn" id="tp-copy">📋 Salin rencana</button>`;
}

function bindTrade(r){
  const inp = $("tp-modal");
  if(inp){
    inp.addEventListener("input", ()=>{
      const digits = inp.value.replace(/\D/g,"");
      inp.value = digits ? fmtN.format(Number(digits)) : "";
      renderCalc(r, Number(digits||0));
    });
  }
  const btn = $("tp-copy");
  if(btn) btn.addEventListener("click", async ()=>{
    const P = planLevels(r);
    const lines = [
      `${r.kode} — Rencana Trading (${r.rating})`,
      P.bl!=null ? `Buy area : ${rp(P.bl)} – ${rp(P.bh)} (avg ${rp(P.avg)})` : null,
      ...P.tps.map(([n,v])=>`${n}      : ${rp(v)}`),
      P.sl!=null ? `Stop Loss: ${rp(P.sl)}` : null,
      r.risk_reward!=null ? `R/R      : ${r.risk_reward}` : null,
      `(Screener otomatis — bukan nasihat keuangan)`,
    ].filter(Boolean).join("\n");
    try{ await navigator.clipboard.writeText(lines); btn.textContent="✓ Tersalin"; }
    catch(e){ btn.textContent="Gagal menyalin"; }
    setTimeout(()=>btn.textContent="📋 Salin rencana", 1800);
  });
}

function renderCalc(r, modal){
  const out = $("tp-result");
  if(!out) return;
  const P = planLevels(r);
  const buy = P.avg;
  if(!modal || !buy){ out.innerHTML=""; return; }
  const lots = Math.floor(modal / (buy * LOT));
  if(lots < 1){
    out.innerHTML = `<div class="cnote" style="color:var(--warn)">
      Modal belum cukup untuk 1 lot (butuh ± Rp ${fmtN.format(Math.ceil(buy*LOT))}).</div>`;
    return;
  }
  const sh = lots * LOT, cost = sh * buy;
  const row = (nm, target) => {
    if(target==null) return "";
    const pl = (target - buy) * sh;
    return `<tr><td>${nm} (${rp(target)})</td>
      <td class="mono ${cls(pl)}">${pl>0?"+":""}${fmtN.format(Math.round(pl))}</td>
      <td class="mono ${cls(pl)}">${pct((target-buy)/buy*100)}</td></tr>`;
  };
  out.innerHTML = `<table>
    <tr><td>Posisi</td><td class="mono" colspan="2">${lots} lot (${fmtN.format(sh)} lembar) ≈ Rp ${fmtN.format(Math.round(cost))}</td></tr>
    ${P.tps.map(([n,v])=>row("Profit di "+n, v)).join("")}
    ${row("Rugi di Stop Loss", P.sl)}
  </table>`;
}

function detail(r){
  $("d-title").textContent = r.kode + " · " + (r.nama||"");
  $("d-sub").textContent = [r.sektor, "Market cap "+cap(r.market_cap),
    "Confidence: "+(r.confidence||"—")].filter(Boolean).join("  ·  ");
  const sc = [["Fundamental",r.score_fundamental],["Teknikal",r.score_technical],
    ["News",r.score_news],["Sentimen",r.score_sentiment],
    ["Valuasi",r.score_valuation],["Risiko",r.score_risk],["Total",r.total_score]];
  const kv = [
    ["Harga", rp(r.harga)], ["Fair value", rp(r.fair_value)],
    ["Upside", pct(r.upside_pct)], ["Support", rp(r.support)],
    ["Resistance", rp(r.resistance)], ["RSI 14", num(r.rsi,0)],
    ["Perubahan 3 bln", pct2(r.change_3m)], ["Dividend yield", pct2(r.dividend_yield)],
    ["Net asing (hari ini)", num(r.foreign_net,0)],
    ["Nilai transaksi rata2", cap(r.daily_value_avg)],
  ];
  $("d-body").innerHTML =
    `<div class="scores">${sc.map(([l,v])=>`
      <div class="srow"><span>${l}</span>
      <div class="bar"><i style="width:${v??0}%"></i></div>
      <span class="mono">${num(v)}</span></div>`).join("")}</div>
     ${tradeSection(r)}
     <h3 class="sect">Data Kunci</h3>
     <div class="grid">${kv.map(([l,v])=>`
      <div class="kv"><span>${l}</span><b class="mono">${v}</b></div>`).join("")}</div>
     ${techSection(r)}
     ${newsSection(r)}
     ${r.rating_reasons&&r.rating_reasons.length ?
      `<div class="reasons"><b>Catatan:</b><ul>${
        r.rating_reasons.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div>` : ""}`;
  bindTrade(r);
  $("detail").showModal();
}

function hCell(h, field){
  if(!h) return '<td class="mono" style="color:var(--muted)">menunggu</td>';
  const v = h[field];
  return `<td class="mono ${cls(v)}">${v==null?"—":pct(v)}</td>`;
}

function evalView(ev){
  if(!ev || !ev.total_signals)
    return '<div class="empty">Belum ada sinyal BUY tercatat. Evaluasi mulai terisi setelah sinyal berumur ≥5 hari bursa.</div>';
  const s5 = ev.summary?.h5||{}, s20 = ev.summary?.h20||{};
  const pat = ev.patterns||{};
  const prof = p => p ? `n=${p.n} · Total ${num(p.total)} · Fund ${num(p.fund)} · Tek ${num(p.tech)}` : "belum ada";
  const head = `<div class="evalhead"><div class="board">
      <div class="tile"><b>${ev.total_signals}</b><span>Total sinyal BUY</span></div>
      <div class="tile"><b>${s5.n?s5.win_rate+"%":"—"}</b><span>Win-rate 5 hari (n=${s5.n||0})</span></div>
      <div class="tile"><b class="${cls(s5.avg_return)}">${s5.n?pct(s5.avg_return):"—"}</b><span>Rata2 return 5H</span></div>
      <div class="tile"><b class="${cls(s5.avg_alpha)}">${s5.avg_alpha!=null?pct(s5.avg_alpha):"—"}</b><span>Alpha vs IHSG 5H</span></div>
      <div class="tile"><b>${s20.n?s20.win_rate+"%":"—"}</b><span>Win-rate 20 hari (n=${s20.n||0})</span></div>
      <div class="tile"><b>${ev.pending}</b><span>Menunggu matang</span></div>
    </div></div>
    <div class="evalnote">Win = return absolut &gt; 0 setelah horizon. Alpha = selisih vs IHSG periode sama.
      Profil sinyal menang (5H): ${prof(pat.winners)}. Profil sinyal kalah: ${prof(pat.losers)}.</div>`;
  const rows = (ev.signals||[]).map(s=>`
    <tr>
      <td class="mono"><b>${esc(s.kode)}</b></td>
      <td class="mono">${esc(s.signal_date)}</td>
      <td class="mono">${rp(s.harga_signal)}</td>
      <td class="mono">${num(s.total)}</td>
      ${hCell(s.h5,"return_pct")}
      ${hCell(s.h5,"alpha_pct")}
      ${hCell(s.h20,"return_pct")}
      <td>${s.h5 ? `<span class="badge ${s.h5.win?"b-buy":"b-avoid"}">${s.h5.win?"WIN":"LOSS"}</span>`
                 : '<span class="badge b-neutral">PENDING</span>'}</td>
    </tr>`).join("");
  return head + `<table>
    <thead><tr><th>Kode</th><th>Tgl Sinyal</th><th>Harga Sinyal</th><th>Skor</th>
    <th>Return 5H</th><th>Alpha 5H</th><th>Return 20H</th><th>Status 5H</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

let currentRows = [];
async function render(){
  $("cat-toolbar").hidden = S.tab!=="categories";
  $("search-toolbar").hidden = S.tab!=="all";
  const el = $("content");
  el.className=""; el.innerHTML = '<div class="empty">Memuat…</div>';

  if(S.tab==="eval"){
    currentRows = [];
    el.innerHTML = evalView(await load("evaluation"));
    return;
  }

  let rows;
  if(S.tab==="categories"){
    const c = await load("categories"); rows = c ? c[S.cat] : null;
  }else if(S.tab==="all"){
    const all = await load("all_scores") || [];
    const q = S.q.trim().toUpperCase();
    rows = !q ? all.slice(0,100)
      : all.filter(r => (r.kode||"").includes(q) ||
          (r.nama||"").toUpperCase().includes(q)).slice(0,100);
    $("q-count").textContent = q ? rows.length+" hasil (maks 100)" : "100 teratas";
  }else{
    rows = await load(S.tab);
  }
  currentRows = rows || [];
  el.innerHTML = rowsTable(currentRows, await loadPrevRanks());
}

$("tabs").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  S.tab = b.dataset.tab;
  document.querySelectorAll("#tabs button").forEach(x=>
    x.classList.toggle("active", x===b));
  render();
});
$("cat-select").addEventListener("change", e=>{S.cat=e.target.value;render();});
$("q").addEventListener("input", e=>{S.q=e.target.value;render();});
$("content").addEventListener("click", e=>{
  const tr = e.target.closest("tr[data-k]"); if(!tr) return;
  const r = currentRows.find(x=>x.kode===tr.dataset.k); if(r) detail(r);
});
$("d-close").addEventListener("click", ()=>$("detail").close());
$("detail").addEventListener("click", e=>{
  if(e.target===$("detail")) $("detail").close();
});

(async ()=>{
  const m = await load("meta");
  if(m){
    const d = m.dataset_generated_at ?
      new Date(m.dataset_generated_at).toLocaleString("id-ID",
        {dateStyle:"full", timeStyle:"short"}) : "—";
    $("meta").textContent = "Data per " + d + " (end-of-day, otomatis tiap hari bursa)";
    $("c-scored").textContent = m.count_scored ?? "–";
    $("c-buy").textContent = m.count_buy ?? "–";
    $("board").hidden = false;
  }else{
    $("meta").textContent = "Data belum tersedia — jalankan workflow dulu.";
  }
  const w = await load("watchlist"); $("c-watch").textContent = w? w.length : "–";
  const a = await load("avoid");     $("c-avoid").textContent = a? a.length : "–";
  render();
})();
</script>
</body>
</html>
